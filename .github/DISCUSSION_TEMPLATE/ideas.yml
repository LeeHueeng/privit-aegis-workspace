title: "[Idea]: "
labels:
  - idea
body:
  - type: markdown
    attributes:
      value: |
        Share ideas for passive checks, documentation, report UX, or AI-assisted remediation. Do not include secrets, private URLs, or unauthorized target details.
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What should Privit Aegis make easier?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Passive security check
        - Web console
        - Report UX
        - CLI workflow
        - AI settings
        - Documentation
        - GitHub Actions
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety notes
      description: Mention whether this stays passive or needs explicit scope approval.
