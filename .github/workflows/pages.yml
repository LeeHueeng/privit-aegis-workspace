name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "README*.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "CHANGELOG.md"
      - "docs/LANGUAGES.md"
      - "docs/ROADMAP.md"
      - "docs/pages/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
      - name: Validate documentation site
        run: npm run site:check
      - name: Check GitHub Pages availability
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/pages" >/tmp/aegis-pages.json 2>/tmp/aegis-pages-error.txt; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled for this repository." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### GitHub Pages deployment skipped"
              echo ""
              echo "The documentation site is valid, but GitHub Pages is not enabled for this repository."
              echo ""
              echo "Enable Pages with the GitHub Actions source, then rerun this workflow."
              echo ""
              echo '```text'
              cat /tmp/aegis-pages-error.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      # actions/configure-pages v6.0.0
      - if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      # actions/upload-pages-artifact v5.0.0
      - if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: docs/pages
      # actions/deploy-pages v5.0.0
      - id: deployment
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
