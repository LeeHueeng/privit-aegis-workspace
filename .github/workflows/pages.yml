name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "README*.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "CHANGELOG.md"
      - "docs/LANGUAGES.md"
      - "docs/ROADMAP.md"
      - "docs/pages/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # actions/checkout v5.0.1
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      # actions/setup-node v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
      - name: Validate documentation site
        run: npm run site:check
      - name: Check GitHub Pages availability
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/pages" >/tmp/aegis-pages.json 2>/tmp/aegis-pages-error.txt; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled for this repository." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### GitHub Pages deployment skipped"
              echo ""
              echo "The documentation site is valid, but GitHub Pages is not enabled for this repository or the current plan does not support Pages for private repositories."
              echo ""
              echo "Enable Pages with the GitHub Actions source, make the repository public, or use a plan that supports private-repository Pages."
              echo ""
              echo '```text'
              cat /tmp/aegis-pages-error.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      # actions/configure-pages v5
      - if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      # actions/upload-pages-artifact v3
      - if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: docs/pages
      # actions/deploy-pages v4
      - id: deployment
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
