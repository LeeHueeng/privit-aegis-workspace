name: Privit Aegis

on:
  pull_request:
  workflow_dispatch:

jobs:
  aegis:
    runs-on: ubuntu-latest
    env:
      AEGIS_CLI_SOURCE: git+https://github.com/LeeHueeng/privit-project.git
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g "$AEGIS_CLI_SOURCE" aigate-cli
      - run: npm run ci:aegis
