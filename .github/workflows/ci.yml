name: Privit Aegis

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: privit-aegis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aigate:
    name: AIGate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AEGIS_CLI_REF: e5bcf4d0bac456a44b9548084cd8366fcc00c0a3
      AIGATE_CLI_VERSION: 0.1.7
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"
          cache: npm
      - name: Install workspace dependencies
        run: npm ci --ignore-scripts
      - name: Audit workspace dependencies
        run: npm run security:audit
      - name: Docs and Pages check
        run: npm run site:check
      - name: Security hardening baseline
        run: npm run security:hardening -- --format json
      - name: Install Aegis and AIGate
        run: npm install -g "git+https://github.com/LeeHueeng/privit-project.git#${AEGIS_CLI_REF}" "aigate-cli@${AIGATE_CLI_VERSION}"
      - run: npm run ci:aegis:github
      - run: npm run gate:ready
      - run: npm run ai:doctor
