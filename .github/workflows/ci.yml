name: Privit Aegis

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: privit-aegis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aigate:
    name: AIGate
    runs-on: ubuntu-latest
    env:
      AEGIS_CLI_REF: 03e3fb5310ee80f4915cc37bd14a1e3dc31610f3
      AIGATE_CLI_VERSION: 0.1.7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install workspace dependencies
        run: npm ci --ignore-scripts
      - name: Audit workspace dependencies
        run: npm run security:audit
      - name: Install Aegis and AIGate
        env:
          AEGIS_CLI_TOKEN: ${{ secrets.AEGIS_CLI_TOKEN }}
        run: |
          if [ -z "$AEGIS_CLI_TOKEN" ]; then
            echo "::error title=Missing AEGIS_CLI_TOKEN::Create a fine-grained token with read access to LeeHueeng/privit-project and save it as this repository secret."
            exit 1
          fi
          git config --global url."https://x-access-token:${AEGIS_CLI_TOKEN}@github.com/".insteadOf "https://github.com/"
          npm install -g "git+https://github.com/LeeHueeng/privit-project.git#${AEGIS_CLI_REF}" "aigate-cli@${AIGATE_CLI_VERSION}"
          git config --global --unset-all url."https://x-access-token:${AEGIS_CLI_TOKEN}@github.com/".insteadOf || true
      - run: npm run ci:aegis
      - run: npm run gate:ready
      - run: npm run ai:doctor
